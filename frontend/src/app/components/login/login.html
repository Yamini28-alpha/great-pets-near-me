<div class="login-container">
  <div class="login-card">
    <!-- Header Section -->
    <div class="login-header">
      <div class="login-logo">
        <span class="logo-icon">🐾</span>
        <h1>Great Pets Near Me</h1>
      </div>
      <h2>Welcome Back</h2>
      <p>Sign in to your account to continue your pet adoption journey</p>
    </div>

    <!-- Login Form -->
    <form class="login-form" (ngSubmit)="onSubmit()">
      <!-- Email Field -->
      <div class="form-group">
        <label for="email" class="form-label">Email Address</label>
        <div class="input-container">
          <span class="input-icon"></span>
          <input
            type="email"
            id="email"
            [(ngModel)]="credentials.email"
            name="email"
            placeholder="Enter your email address"
            required
            class="form-input"
            [class.invalid]="error"
          >
        </div>
      </div>

      <!-- Password Field -->
      <div class="form-group">
        <div class="password-header">
          <label for="password" class="form-label">Password</label>
          <a href="javascript:void(0)" class="forgot-password">Forgot password?</a>
        </div>
        <div class="input-container">
          <span class="input-icon"></span>
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            [(ngModel)]="credentials.password"
            name="password"
            placeholder="Enter your password"
            required
            class="form-input"
            [class.invalid]="error"
          >
          <button type="button" class="password-toggle" (click)="togglePasswordVisibility()">
            <span class="toggle-icon">{{ showPassword ? 'No' : '🔒' }}</span>
          </button>
        </div>
      </div>

      <!-- Error Message -->
      <div *ngIf="error" class="error-message">
        <span class="error-icon">
          <img src="icons/warning-sign-9749.png" alt="Warning icon">
        </span>
        {{ error }}
      </div>

      <!-- Submit Button -->
      <button type="submit" class="login-btn" [disabled]="isLoading">
        <span *ngIf="!isLoading">Sign In</span>
        <span *ngIf="isLoading" class="loading-spinner">
          <span class="spinner"></span>
          Signing In...
        </span>
      </button>
    </form>

    <!-- Divider -->
    <div class="divider">
      <span>New to our platform?</span>
    </div>

    <!-- Register Link -->
    <div class="register-section">
      <p>Don't have an account? <a routerLink="/register" class="register-link">Create one here</a></p>
    </div>    
  </div>
</div>
